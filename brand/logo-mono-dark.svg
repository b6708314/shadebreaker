<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="ShadeBreaker Insights (monochrome)">
  <title>ShadeBreaker Insights — Monochrome (for single-color print, foil, embossing)</title>
  <defs>
    <clipPath id="mono-clip"><rect x="12" y="12" width="176" height="176" rx="38"/></clipPath>
  </defs>
  <rect x="12" y="12" width="176" height="176" rx="38" fill="#0B1F3A"/>
  <g clip-path="url(#mono-clip)">
    <!-- Half-sun -->
    <path d="M56 132 A44 44 0 0 1 144 132 Z" fill="#F7F3EC"/>
    <!-- Horizon -->
    <line x1="12" y1="132" x2="188" y2="132" stroke="#F7F3EC" stroke-width="3"/>
    <!-- Two faint lines above sun to suggest atmospheric glow (reproducible in mono) -->
    <g stroke="#F7F3EC" stroke-opacity="0.35">
      <path d="M40 110 A60 60 0 0 1 160 110" fill="none" stroke-width="1.5"/>
      <path d="M28 92 A72 72 0 0 1 172 92" fill="none" stroke-width="1.2"/>
    </g>
    <rect x="12" y="132" width="176" height="58" fill="#0B1F3A"/>
  </g>
</svg>
